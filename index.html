<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<title>DailyLearn</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet"/>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #FFFBF5;
    overscroll-behavior: none;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }
  body {
    font-family: 'Nunito', 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
    color: #0F172A;
    min-height: 100vh;
  }
  #root { width: 100%; height: 100vh; }

  /* Mobile-first: sidebar hidden, stage fills viewport */
  .dl-app {
    display: flex;
    width: 100%;
    height: 100vh;
    background: #FFFBF5;
  }
  .dl-sidebar { display: none; }
  .dl-stage {
    flex: 1;
    width: 100%;
    height: 100vh;
    background: #FFFBF5;
    position: relative;
    overflow: hidden;
  }

  /* Desktop layout: ≥768px shows sidebar + content */
  @media (min-width: 768px) {
    body { background: #f0eee9; }
    .dl-app {
      max-width: 880px;
      margin: 0 auto;
      background: #FFFBF5;
      box-shadow: 0 0 60px rgba(15,23,42,0.06);
    }
    .dl-sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 248px;
      flex-shrink: 0;
      padding: 24px 16px 20px;
      background: #FFFBF5;
      border-right: 1px solid #F1E8DC;
      box-sizing: border-box;
    }
    .dl-stage {
      flex: 1;
      max-width: none;
      border-right: none;
    }
    /* The hamburger is redundant when the sidebar is visible */
    .dl-tabbar { display: none !important; }
  }

  /* Sidebar internals */
  .dl-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 14px;
    border-bottom: 1px solid #F1E8DC;
    margin-bottom: 6px;
  }
  .dl-nav { display: flex; flex-direction: column; gap: 4px; }
  .dl-nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 12px;
    background: transparent;
    border: 1.5px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: background 120ms, border-color 120ms;
  }
  .dl-nav-item:hover { background: #FFF5E6; }
  .dl-nav-item.active {
    background: #FF7A45;
    border-color: #FF7A45;
    box-shadow: 0 3px 0 #C8431A;
  }
  .dl-nav-icon { width: 20px; height: 20px; display: flex; flex-shrink: 0; }
  .dl-nav-text { display: flex; flex-direction: column; gap: 2px; }
  .dl-nav-label {
    font-size: 14px; font-weight: 900; color: #0F172A;
    font-family: "Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    line-height: 1.1;
  }
  .dl-nav-sub {
    font-size: 10px; font-weight: 700; color: #94A3B8;
    font-family: "Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
  }
  .dl-nav-item.active .dl-nav-label { color: #fff; }
  .dl-nav-item.active .dl-nav-sub { color: rgba(255,255,255,0.85); }
  .dl-streak-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: linear-gradient(135deg, #FFF7ED 0%, #FFEDD5 100%);
    border: 1.5px solid #FED7AA;
    border-radius: 16px;
    box-shadow: 0 3px 0 #F0E2CD;
  }
  @keyframes dlblink { 0%,80%,100% { opacity: 0.3 } 40% { opacity: 1 } }
  @keyframes dlpulse { 0% { transform: scale(1); opacity: 0.5 } 100% { transform: scale(1.4); opacity: 0 } }
  @keyframes dlfade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .dl-screen { animation: dlfade 240ms cubic-bezier(.2,.7,.3,1); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react" src="screens/shared.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/home.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/roadmap.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/article.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/chat.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/profile.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/account.jsx"></script>
<script type="text/babel" data-presets="react" src="screens/create.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [route, setRoute] = React.useState({ name: 'home' });
  const navigate = React.useCallback((name, params) => {
    setRoute({ name, params: params || {} });
    requestAnimationFrame(() => {
      const stage = document.querySelector('.dl-stage');
      if (stage) stage.scrollTop = 0;
    });
  }, []);

  const Screen = {
    home: window.HomeScreen,
    roadmap: window.RoadmapScreen,
    article: window.ArticleScreen,
    chat: window.ChatScreen,
    profile: window.ProfileScreen,
    account: window.AccountScreen,
    create: window.CreateScreen,
  }[route.name] || window.HomeScreen;

  return (
    <window.NavContext.Provider value={{ route, navigate }}>
      <div className="dl-app">
        <window.Sidebar/>
        <div className="dl-stage">
          <div key={route.name} className="dl-screen" style={{ width: '100%', height: '100%' }}>
            <Screen params={route.params || {}} />
          </div>
        </div>
      </div>
    </window.NavContext.Provider>
  );
}

const tryMount = () => {
  if (window.HomeScreen && window.RoadmapScreen && window.ArticleScreen
    && window.ChatScreen && window.ProfileScreen && window.AccountScreen && window.CreateScreen
    && window.NavContext && window.Sidebar) {
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  } else {
    setTimeout(tryMount, 50);
  }
};
tryMount();
</script>
</body>
</html>
